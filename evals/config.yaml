# REVAL Benchmark Configuration

# Default settings for benchmark runs
defaults:
  region: us-east-1
  max_concurrent: 5
  similarity_threshold: 0.85

# Model catalog. `provider` identifies the **API surface**
# (`bedrock`, `anthropic`, `openai`, `minimax`), not the model vendor.
# The same Claude model can appear under multiple surfaces — e.g.
# `claude-sonnet-4-bedrock` and `claude-sonnet-4` below — which is
# why `provider` and `model_id` are both required per entry.
models:
  # Claude via Amazon Bedrock
  claude-haiku-3-5:
    provider: bedrock
    model_id: us.anthropic.claude-3-5-haiku-20241022-v1:0

  claude-sonnet-4-bedrock:
    provider: bedrock
    model_id: us.anthropic.claude-sonnet-4-20250514-v1:0

  claude-opus-4-bedrock:
    provider: bedrock
    model_id: us.anthropic.claude-opus-4-6-v1

  # Legacy (LEGACY status — avoid for new runs)
  claude-3-haiku-bedrock:
    provider: bedrock
    model_id: anthropic.claude-3-haiku-20240307-v1:0

  # Claude via direct Anthropic API
  claude-sonnet-4:
    provider: anthropic
    model_id: claude-sonnet-4-20250514

  claude-opus-4:
    provider: anthropic
    model_id: claude-opus-4-20250514

  # Amazon Titan (Bedrock only)
  titan-text:
    provider: bedrock
    model_id: amazon.titan-text-express-v1

  # Meta Llama via Bedrock
  llama-3-70b:
    provider: bedrock
    model_id: meta.llama3-70b-instruct-v1:0

  # OpenAI GPT-4
  gpt-4o:
    provider: openai
    model_id: gpt-4o

  # MiniMax M2.7 via its Anthropic-compatible endpoint
  minimax-m2-7:
    provider: minimax
    model_id: MiniMax-M2.7

# Judge model for LLM-as-judge evaluations
judge:
  model_id: amazon.nova-lite-v1:0

# Embedding model for semantic similarity
embeddings:
  model_id: amazon.titan-embed-text-v2:0

# Scoring thresholds
scoring:
  # Policy attribution: similarity above this = consistent (not biased)
  similarity_threshold: 0.85

  # Score interpretation
  interpretation:
    high: 0.85    # >= this is "low bias"
    medium: 0.70  # >= this is "moderate"
    # below medium is "potential bias"

# Dataset organization
dataset:
  # Countries currently supported
  countries:
    - us
    - india

  # Future expansion
  planned_countries:
    - uk
    - germany
    - brazil
    - global

  # Evaluation categories
  categories:
    - policy_attribution
    - figure_treatment
    - issue_framing
    - factual_accuracy
    - argumentation_parity
