name: Bedrock Eval Suite

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evals:
    if: >-
      (github.event_name == 'workflow_dispatch' && github.actor == 'krishnakartik1') ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
       contains(github.event.pull_request.labels.*.name, 'run-evals') &&
       github.actor == 'krishnakartik1')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run eval suite
        run: pytest -m eval evaluations/ --tb=short -v --junitxml=eval-results.xml
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: eval-results.xml
